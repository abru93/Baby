<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Waiting</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

        background: 
            linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
            url("Boy OR Girl.jpg") no-repeat center center / cover;

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        width: 92%;
        max-width: 420px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(18px);
        border-radius: 28px;
        padding: 28px 22px;
        text-align: center;
        box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    .weeks {
        margin-bottom: 22px;
        font-size: 18px;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.5px;
    }

    .timer {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
    }

    .box {
        background: rgba(255,255,255,0.9);
        padding: 18px 8px;
        border-radius: 18px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        transition: transform 0.2s ease;
    }

    .box:hover {
        transform: translateY(-3px);
    }

    .number {
        font-size: 28px;
        font-weight: 700;
        color: #222;
        margin-bottom: 4px;
    }

    .label {
        font-size: 11px;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .footer {
        margin-top: 24px;
        font-size: 15px;
        color: #fff;
        opacity: 0.9;
    }

    /* Mobile optimization */
    @media (max-width: 350px) {
        .number {
            font-size: 22px;
        }
        .label {
            font-size: 10px;
        }
    }
</style>
</head>

<body>

<div class="app">

    <div class="weeks" id="weeks"></div>

    <div class="timer">
        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>
        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>
        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>
        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="footer" id="status"></div>
</div>

<script>
    const targetDate = new Date("2026-08-10T00:00:00").getTime();
    const startDate = new Date("2025-11-03T00:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            document.getElementById("status").innerText = "Baby has arrived! 🎉";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        const passedDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(passedDays / 7);
        const extraDays = passedDays % 7;

        document.getElementById("weeks").innerText =
            "Week " + weeks + " + " + extraDays + " days";
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
