<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Countdown</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;

    /* BACKGROUND IMAGE */
    background: 
        linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)),
        url("Boy OR Girl.jpg") no-repeat center center / cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Card */
.app {
    width: 95%;
    max-width: 500px;
    background: rgba(255, 250, 245, 0.9);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Title */
.title {
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

/* Updated color spans for the new title */
.title span.color1 { color: #ff6b6b; } /* "WAITING" */
.title span.color2 { color: #4ecdc4; } /* "FOR" */
.title span.color3 { color: #ffcc5c; } /* "OUR" */
.title span.color4 { color: #6c5ce7; } /* "BABY!!!" */

/* Subtitle */
.subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 10px;
}

/* Weeks */
.weeks {
    font-size: 18px;
    margin: 10px 0;
    color: #333;
}

/* TIMER */
.timer {
    margin-top: 20px;
}

.time {
    font-size: 34px;
    font-weight: bold;
    margin: 5px 0;
}

.days { color: #ff6b6b; }
.hours { color: #4ecdc4; }
.minutes { color: #ffcc5c; }
.seconds { color: #6c5ce7; }

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
}

</style>
</head>

<body>

<div class="app">

    <div class="title">
        <span class="color1">WAITING</span> 
        <span class="color2">FOR</span> 
        <span class="color3">OUR</span>
        <span class="color4">BABY!!!</span>
    </div>

    <div class="subtitle">Boy or Girl?</div>

    <div class="weeks" id="weeks"></div>

    <div class="timer">
        <div class="time">
            <span id="days" class="days">0</span> days
        </div>
        <div class="time">
            <span id="hours" class="hours">0</span> hours
        </div>
        <div class="time">
            <span id="minutes" class="minutes">0</span> minutes
        </div>
        <div class="time">
            <span id="seconds" class="seconds">0</span> seconds
        </div>
    </div>

    <div class="footer" id="status">...until my due date!</div>

</div>

<script>
const targetDate = new Date("2026-08-16T00:00:00").getTime();
const startDate = new Date("2025-11-09T00:00:00").getTime();

function updateTimer() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance <= 0) {
        document.getElementById("status").innerText = "Baby has arrived! 🎉";
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;

    const passedDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
    const weeks = Math.floor(passedDays / 7);
    const extraDays = passedDays % 7;

    document.getElementById("weeks").innerText =
        "You're " + weeks + " weeks + " + extraDays + " days!";
}

updateTimer();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
