<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Waiting</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

        /* Baby Theme Background */
        background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #fff5cc);

        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Soft floating pattern effect */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 2px, transparent 3px),
                          radial-gradient(circle at 70% 60%, rgba(255,255,255,0.3) 2px, transparent 3px),
                          radial-gradient(circle at 50% 80%, rgba(255,255,255,0.4) 2px, transparent 3px);
        z-index: 0;
    }

    .app {
        position: relative;
        z-index: 1;

        width: 95%;
        max-width: 800px;
        height: 85vh;

        background: rgba(255,255,255,0.35);
        backdrop-filter: blur(18px);
        border-radius: 30px;
        padding: 20px;

        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;

        box-shadow: 0 10px 35px rgba(0,0,0,0.15);
    }

    /* LEFT SIDE */
    .left {
        width: 45%;
        text-align: center;
    }

    .baby-img {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 50%;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        border: 4px solid white;
    }

    .weeks {
        margin-top: 15px;
        font-size: 18px;
        font-weight: 500;
        color: #444;
    }

    /* RIGHT SIDE */
    .right {
        width: 50%;
        text-align: center;
    }

    .timer {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .box {
        background: rgba(255,255,255,0.95);
        padding: 20px 10px;
        border-radius: 20px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .number {
        font-size: 34px;
        font-weight: 700;
        color: #333;
    }

    .label {
        font-size: 12px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .footer {
        margin-top: 15px;
        font-size: 15px;
        color: #555;
    }

    /* Responsive */
    @media (max-width: 600px) {
        .app {
            flex-direction: column;
            height: auto;
        }

        .left, .right {
            width: 100%;
        }

        .timer {
            grid-template-columns: repeat(4, 1fr);
        }
    }

</style>
</head>

<body>

<div class="app">

    <!-- LEFT -->
    <div class="left">
        <img src="Boy OR Girl.jpg" class="baby-img" alt="Baby">
        <div class="weeks" id="weeks"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="timer">
            <div class="box">
                <div id="days" class="number">0</div>
                <div class="label">Days</div>
            </div>
            <div class="box">
                <div id="hours" class="number">0</div>
                <div class="label">Hours</div>
            </div>
            <div class="box">
                <div id="minutes" class="number">0</div>
                <div class="label">Minutes</div>
            </div>
            <div class="box">
                <div id="seconds" class="number">0</div>
                <div class="label">Seconds</div>
            </div>
        </div>

        <div class="footer" id="status"></div>
    </div>

</div>

<script>
    const targetDate = new Date("2026-08-10T00:00:00").getTime();
    const startDate = new Date("2025-11-03T00:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            document.getElementById("status").innerText = "Baby has arrived! 🎉";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        const passedDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(passedDays / 7);
        const extraDays = passedDays % 7;

        document.getElementById("weeks").innerText =
            "Week " + weeks + " + " + extraDays + " days";
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
