<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Waiting</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        background: linear-gradient(135deg, #ffd6e0, #cde7ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        width: 95%;
        max-width: 400px;
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(12px);
        border-radius: 25px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    /* Baby Image */
    .baby-img {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 50%;
        margin-bottom: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .weeks {
        margin: 10px 0 20px;
        font-size: 16px;
        color: #555;
    }

    .timer {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    .box {
        background: white;
        padding: 15px 5px;
        border-radius: 15px;
    }

    .number {
        font-size: 26px;
        font-weight: bold;
        color: #333;
    }

    .label {
        font-size: 12px;
        color: #888;
    }

    .footer {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
    }
</style>
</head>

<body>

<div class="app">
    <!-- Image -->
    <img src="Boy OR Girl.jpg" class="baby-img" alt="Boy OR Girl">

    <div class="weeks" id="weeks"></div>

    <div class="timer">
        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Days</div>
        </div>
        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Hours</div>
        </div>
        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutes</div>
        </div>
        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Seconds</div>
        </div>
    </div>

    <div class="footer" id="status"></div>
</div>

<script>
    const targetDate = new Date("2026-08-10T00:00:00").getTime();
    const startDate = new Date("2025-11-03T00:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            document.getElementById("status").innerText = "Baby has arrived! 🎉";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;

        const passedDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(passedDays / 7);
        const extraDays = passedDays % 7;

        document.getElementById("weeks").innerText =
            "Week " + weeks + " + " + extraDays + " days";
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
