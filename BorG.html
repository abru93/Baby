<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Arrival Countdown</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Quicksand:wght@300;700&family=Montserrat:wght@800&family=Dancing+Script:wght@700&display=swap');

        body {
            background-image: url('Boy OR Girl.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 60px 40px;
            border-radius: 50px;
            text-align: center;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Updated Header with ellipsis */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 1px;
            color: #63352e;
            margin-top: 0;
            margin-bottom: 40px; /* Increased margin since icons are gone */
            animation: fadeInDown 1.5s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STATUS & TIMER --- */
        .pregnancy-status {
            display: inline-block;
            padding: 12px 35px;
            margin-bottom: 40px;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(-45deg, #a2d2ff, #ffafcc, #bde0fe, #ffc8dd);
            background-size: 400% 400%;
            border-radius: 100px;
            animation: gradientShift 8s ease infinite, bounce 3s ease-in-out infinite;
            box-shadow: 0 8px 15px rgba(162, 210, 255, 0.3);
            border: 3px solid white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .timer-grid {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-bottom: 25px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.45);
            flex: 1;
            padding: 25px 10px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            animation: float 4s ease-in-out infinite;
        }

        .time-box:nth-child(2) { animation-delay: 0.5s; }
        .time-box:nth-child(3) { animation-delay: 1s; }
        .time-box:nth-child(4) { animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .time-box span {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4a2c2a;
            letter-spacing: -2px;
            line-height: 1;
            display: block;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 2px;
            color: #8d5b4c;
            margin-top: 8px;
        }

        .footer-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #d17a5d;
            margin-top: 35px;
            opacity: 0.9;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.7rem; }
            .time-box span { font-size: 1.6rem; }
            .pregnancy-status { font-size: 1.2rem; padding: 10px 25px; }
            .footer-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Waiting for our baby...</h1>

    <div class="pregnancy-status" id="statusLine">
        You're ... weeks & ... days!
    </div>

    <div class="timer-grid">
        <div class="time-box">
            <span id="days">000</span>
            <div class="label">Days</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Hours</div>
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            <div class="label">Mins</div>
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            <div class="label">Secs</div>
        </div>
    </div>

    <p class="footer-text">.....until my due date!</p>
</div>

<script>
    // Pregnancy calculation: Start 11/09/2025 | Due 16/08/2026
    const startDate = new Date("2025-11-09T00:00:00").getTime();
    const dueDate = new Date("2026-08-16T23:59:59").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        
        // 1. Update Weeks & Days Status
        const diffFromStart = now - startDate;
        if (diffFromStart > 0) {
            const totalDaysPregnant = Math.floor(diffFromStart / (1000 * 60 * 60 * 24));
            const weeks = Math.floor(totalDaysPregnant / 7);
            const daysRemainder = totalDaysPregnant % 7;
            document.getElementById("statusLine").innerHTML = `You're ${weeks} weeks & ${daysRemainder} days!`;
        }

        // 2. Update Due Date Countdown
        const timeLeft = dueDate - now;

        if (timeLeft > 0) {
            const d = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const h = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((timeLeft % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d;
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        } else {
            document.querySelector(".timer-grid").innerHTML = "<h2 style='color:#5b8c85'>Welcome Little One!</h2>";
        }
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
